services:
  - type: web
    name: beuteplan-lidl-proxy
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "bash build.sh"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 30"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CORS_ORIGINS
        value: "*"
      - key: CACHE_TTL_SECONDS
        value: "21600"
      - key: DEFAULT_ORT
        value: "Berlin"
      - key: DEFAULT_LAND
        value: "DE"
