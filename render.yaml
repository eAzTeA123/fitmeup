services:
  - type: web
    name: beuteplan-proxy
    runtime: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      git clone https://github.com/EvickaStudio/lidl-discounts.git &&
      (pip install -e ./lidl-discounts || true) &&
      cp lidl_proxy.py lidl-discounts/lidl_proxy.py
    startCommand: cd lidl-discounts && gunicorn lidl_proxy:app --bind 0.0.0.0:$PORT --timeout 120 --pythonpath .
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
